<body style="background: url('./images/background.png');background-size: cover; margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <ul id="debugDashboard" style="display: none; background-color: white; width: 20%"></ul>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <p style="margin-top: 5px;">Tutorial: <a href="./Game_Guide/index.html" rel="noopener noreferrer" target="_blank">here</a></p>
        <canvas autofocus height="768" id="gameWorld" oncontextmenu="return false;"
            style="background: black; border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.8); max-width: 90vw; max-height: 80vh;" tabindex="0" width="1024"></canvas>
        <br>
        <div style="display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap; background-color: rgba(255,255,255,0.8); padding: 10px; border-radius: 10px;">
            <label for="debug" style="display: flex; align-items: center; gap: 5px;">
                <input id="debug" onclick="Debugger.switchDebugMode()" type="checkbox"> Debug
            </label>
            <label for="mute" style="display: flex; align-items: center; gap: 5px;">
                <input id="mute" type="checkbox"> Mute
            </label>
            <label for="volume" style="display: flex; align-items: center; gap: 5px;">
                <input id="volume" max="1" min="0" step="0.1" type="range" value="0.1"> Volume
            </label>
            <div style="display: flex; gap: 5px;">
                <button onclick="Controller.clearMovement(); Controller.up = true" type="button" style="padding: 5px 10px; cursor: pointer;">Up</button>
                <button onclick="Controller.clearMovement(); Controller.down = true" type="button" style="padding: 5px 10px; cursor: pointer;">Down</button>
                <button onclick="Controller.clearMovement(); Controller.left = true" type="button" style="padding: 5px 10px; cursor: pointer;">Left</button>
                <button onclick="Controller.clearMovement(); Controller.right = true" type="button" style="padding: 5px 10px; cursor: pointer;">Right</button>
                <button onclick="Controller.clearMovement()" type="button" style="padding: 5px 10px; cursor: pointer;">Stop</button>
            </div>
        </div>
    </div>
</body>

</html>
