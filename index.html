<body style="background: url('./images/background.png');background-size: cover; margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <ul id="debugDashboard" style="display: none; position: fixed; top: 20px; right: 20px; background-color: rgba(0, 0, 0, 0.85); color: #00ff00; font-family: 'Courier New', Courier, monospace; list-style: none; padding: 15px; border-radius: 8px; width: 310px; max-height: 80vh; overflow-y: auto; z-index: 1000; font-size: 12px; border: 1px solid #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.3); pointer-events: auto;"></ul>
    <div id="pauseMenu" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; color: white; font-family: 'Verdana', sans-serif;">
        <div style="background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); display: flex; flex-direction: column; align-items: center; gap: 20px; min-width: 300px;">
            <h1 style="margin: 0; font-size: 32px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">Game Paused</h1>
            <p style="margin-top: -10px; opacity: 0.8; font-size: 14px;">Press ESC to resume</p>
            <button onclick="GAME_ENGINE.togglePause()" style="width: 100%; padding: 12px; border-radius: 10px; border: none; background: #4CAF50; color: white; font-weight: bold; cursor: pointer; transition: transform 0.2s;">Resume</button>
            <button onclick="SaveManager.save(); GAME_ENGINE.togglePause()" style="width: 100%; padding: 12px; border-radius: 10px; border: none; background: #2196F3; color: white; font-weight: bold; cursor: pointer;">Save Game</button>
            <button onclick="if(confirm('Are you sure you want to reset all progress?')) SaveManager.reset()" style="width: 100%; padding: 12px; border-radius: 10px; border: none; background: #f44336; color: white; font-weight: bold; cursor: pointer;">Reset Progress</button>
        </div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <p style="margin-top: 5px;">Tutorial: <a href="./Game_Guide/index.html" rel="noopener noreferrer" target="_blank">here</a></p>
        <canvas autofocus height="900" id="gameWorld" oncontextmenu="return false;"
            style="background: black; border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.8); max-width: 95vw; max-height: 90vh;" tabindex="0" width="1200"></canvas>
        <br>
        <div style="display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap; background-color: rgba(255,255,255,0.8); padding: 10px; border-radius: 10px;">
            <button onclick="GAME_ENGINE.togglePause()" style="padding: 5px 15px; cursor: pointer; background: #ff9800; color: white; border: none; border-radius: 5px; font-weight: bold;">Pause (Esc)</button>
            <label for="debug" style="display: flex; align-items: center; gap: 5px;">
                <input id="debug" onclick="Debugger.switchDebugMode()" type="checkbox"> Debug
            </label>
            <label for="mute" style="display: flex; align-items: center; gap: 5px;">
                <input id="mute" type="checkbox"> Mute
            </label>
            <label for="volume" style="display: flex; align-items: center; gap: 5px;">
                <input id="volume" max="1" min="0" step="0.1" type="range" value="0.1"> Volume
            </label>
            <div style="display: flex; gap: 5px;">
                <button onclick="Controller.clearMovement(); Controller.up = true" type="button" style="padding: 5px 10px; cursor: pointer;">Up</button>
                <button onclick="Controller.clearMovement(); Controller.down = true" type="button" style="padding: 5px 10px; cursor: pointer;">Down</button>
                <button onclick="Controller.clearMovement(); Controller.left = true" type="button" style="padding: 5px 10px; cursor: pointer;">Left</button>
                <button onclick="Controller.clearMovement(); Controller.right = true" type="button" style="padding: 5px 10px; cursor: pointer;">Right</button>
                <button onclick="Controller.clearMovement()" type="button" style="padding: 5px 10px; cursor: pointer;">Stop</button>
            </div>
        </div>
    </div>
</body>

</html>
